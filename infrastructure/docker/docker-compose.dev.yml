version: "3.9"

# Development override — run with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  # ─── PostgreSQL (dev: exposed for local tools) ─────────────────────
  postgres:
    ports:
      - "5432:5432"

  # ─── Redis (dev: exposed for local tools) ──────────────────────────
  redis:
    ports:
      - "6379:6379"

  # ─── Backend API (dev: hot reload + debug) ─────────────────────────
  backend:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.backend
      target: development
    environment:
      NODE_ENV: development
    volumes:
      - ../../apps/backend-api/src:/app/apps/backend-api/src
      - ../../packages:/app/packages
    ports:
      - "4000:4000"
      - "9229:9229"  # Node.js debugger
    command: ["npm", "run", "start:dev", "--", "--debug=0.0.0.0:9229"]

  # ─── Customer PWA (dev: hot reload) ────────────────────────────────
  customer-pwa:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.customer-pwa
      target: deps
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
    volumes:
      - ../../apps/customer-pwa/src:/app/apps/customer-pwa/src
      - ../../apps/customer-pwa/public:/app/apps/customer-pwa/public
      - ../../packages:/app/packages
    ports:
      - "3000:3000"
    command: ["npm", "run", "dev", "-w", "apps/customer-pwa"]

  # ─── Admin Dashboard (dev: hot reload) ─────────────────────────────
  admin-dashboard:
    build:
      context: ../../
      dockerfile: infrastructure/docker/Dockerfile.admin
      target: deps
    environment:
      NODE_ENV: development
      WATCHPACK_POLLING: "true"
    volumes:
      - ../../apps/admin-dashboard/src:/app/apps/admin-dashboard/src
      - ../../packages:/app/packages
    ports:
      - "3001:3001"
    command: ["npm", "run", "dev", "-w", "apps/admin-dashboard"]

  # ─── No nginx in development ───────────────────────────────────────
  nginx:
    profiles:
      - disabled
